server:
  port: 8080

spring:
  application:
    name: api-gateway
  
  cloud:
    gateway:
      routes:
        
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**
        
        - id: course-service
          uri: lb://COURSE-SERVICE
          predicates:
            - Path=/api/courses/**,/api/categories/**,/api/sections/**,/api/lectures/**
        
        - id: enrollment-service
          uri: lb://ENROLLMENT-SERVICE
          predicates:
            - Path=/api/enrollments/**,/api/progress/**
        
        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/api/payments/**,/api/orders/**,/api/coupons/**,/api/refunds/**

eureka:
  client:
    service-url:
      defaultZone:
        http://localhost:8761/eureka/
