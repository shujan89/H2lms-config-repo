server:
  port: 8081

spring:
  application:
    name: user-service

  # datasource:
  #   url: jdbc:mysql://localhost:3306/lms
  #   username: root
  #   password: Ray@2002
  #   driver-class-name: com.mysql.cj.jdbc.Driver

  # jpa:
  #   hibernate:
  #     ddl-auto: update
  #   show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true

jwt:
  secret-key: MySecretKeyMySecretKeyMySecretKey123456
  expiration: 86400000

springdoc:
  api-docs:
    enabled: true

  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    org.springframework.security: TRACE
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
